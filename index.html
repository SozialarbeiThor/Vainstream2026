l Club Stage","start":"17:00","end":"17:30"},{"name":"Volatile Ways","stage":"Green Hell Club Stage","start":"16:00","end":"16:30"},{"name":"Heartless Human Harvest","stage":"Green Hell Club Stage","start":"15:00","end":"15:30"}],saturday:[{"name":"Architects","stage":"EMP Stage","start":"21:20","end":"22:30"},{"name":"Hollywood Undead","stage":"EMP Stage","start":"19:20","end":"20:10"},{"name":"Bloodywood","stage":"EMP Stage","start":"17:45","end":"18:30"},{"name":"Thrown","stage":"EMP Stage","start":"16:15","end":"16:55"},{"name":"We Came As Romans","stage":"EMP Stage","start":"14:50","end":"15:30"},{"name":"Magnolia Park","stage":"EMP Stage","start":"13:35","end":"14:10"},{"name":"Boundaries","stage":"EMP Stage","start":"12:30","end":"13:00"},{"name":"Sondaschule","stage":"Murder Stage","start":"20:15","end":"21:15"},{"name":"Black Veil Brides","stage":"Murder Stage","start":"18:30","end":"19:20"},{"name":"Grandson","stage":"Murder Stage","start":"17:00","end":"17:45"},{"name":"Alkaline Trio","stage":"Murder Stage","start":"15:35","end":"16:15"},{"name":"Future Palace","stage":"Murder Stage","start":"14:10","end":"14:50"},{"name":"Raum27","stage":"Murder Stage","start":"13:00","end":"13:35"},{"name":"The Pretty Wild","stage":"Murder Stage","start":"12:00","end":"12:30"},{"name":"Suicidal Tendencies","stage":"Rocknight Stage","start":"21:30","end":"22:30"},{"name":"Agnostic Front","stage":"Rocknight Stage","start":"20:15","end":"21:00"},{"name":"Smoke Blow","stage":"Rocknight Stage","start":"19:00","end":"19:45"},{"name":"Dog Eat Dog","stage":"Rocknight Stage","start":"17:50","end":"18:30"},{"name":"Delinquent Habits","stage":"Rocknight Stage","start":"16:40","end":"17:20"},{"name":"Scene Queen","stage":"Rocknight Stage","start":"15:35","end":"16:10"},{"name":"Pöbel MC","stage":"Rocknight Stage","start":"14:30","end":"15:05"},{"name":"The Flatliners","stage":"Rocknight Stage","start":"13:30","end":"14:00"},{"name":"Attic109","stage":"Rocknight Stage","start":"12:3 };

var state={day:"friday",view:"all",sel:new Set(),alias:"",allPlans:{}};
var fbOff=null;

function toMin(t){var p=t.split(":"),h=+p[0],m=+p[1];return h<6?(h+24)*60+m:h*60+m;}
function pad2(n){return String(n).padStart(2,"0");}
function fmtM(m){return pad2(Math.floor(m/60)%24)+":"+pad2(m%60);}
function mk(d,n){return d+"::"+n;}
function stageOf(id){return STAGES.find(function(s){return s.id===id;})||STAGES[0];}

function getOthers(d,name){
  var out=[];
  Object.keys(state.allPlans).forEach(function(a){
    if(a===state.alias)return;
    if(((state.allPlans[a]||{})[d]||[]).indexOf(name)>=0)out.push(a);
  });
  return out;
}

function calcConflicts(){
  var c=new Set();
  ["friday","saturday"].forEach(function(d){
    var sel=ACTS[d].filter(function(a){return state.sel.has(mk(d,a.name));});
    for(var i=0;i<sel.length;i++)for(var j=i+1;j<sel.length;j++){
      var aS=toMin(sel[i].start),aE=toMin(sel[i].end),bS=toMin(sel[j].start),bE=toMin(sel[j].end);
      if(aS<bE&&bS<aE){c.add(mk(d,sel[i].name));c.add(mk(d,sel[j].name));}
    }
  });
  return c;
}

function e(tag,st,ch){
  var el=document.createElement(tag);
  if(st)Object.keys(st).forEach(function(k){el.style[k]=st[k];});
  if(ch)ch.forEach(function(c){
    if(c==null)return;
    if(typeof c==="string"||typeof c==="number")el.appendChild(document.createTextNode(c));
    else el.appendChild(c);
  });
  return el;
}
function tx(s){return document.createTextNode(s);}

// ── Firebase ──────────────────────────────────────────────────────────────────
function startListener(){
  if(fbOff){fbOff();fbOff=null;}
  var ref=db.ref("/plans");
  ref.on("value",function(snap){state.allPlans=snap.val()||{};render();});
  fbOff=function(){ref.off();};
}

function savePlan(){
  if(!state.alias)return;
  var plan={friday:[],saturday:[]};
  ["friday","saturday"].forEach(function(d){
    ACTS[d].forEach(function(a){if(state.sel.has(mk(d,a.name)))plan[d].push(a.name);});
  });
  db.ref("/plans/"+state.alias).set(plan);
}

function setAlias(name){
  name=name.trim().slice(0,20);
  if(!name)return;
  state.alias=name;
  localStorage.setItem("vs26_alias",name);
  db.ref("/plans/"+name).once("value",function(snap){
    var plan=snap.val()||{};
    state.sel=new Set();
    ["friday","saturday"].forEach(function(d){(plan[d]||[]).forEach(function(n){state.sel.add(mk(d,n));});});
    startListener();
    render();
  });
}

function changeAlias(){
  if(!confirm("Name ändern?
Dein Plan bleibt gespeichert."))return;
  if(fbOff){fbOff();fbOff=null;}
  state.alias="";state.allPlans={};
  localStorage.removeItem("vs26_alias");
  render();
}

// ── Timeline ──────────────────────────────────────────────────────────────────
function renderTimeline(){
  var d=state.day,cfg=DAYS[d],totalW=(cfg.de-cfg.ds)*PPM,cf=calcConflicts();
  var root=e("div",{});
  // Legend
  var leg=e("div",{padding:"7px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",background:"#0d0d10",borderBottom:"1px solid #1a1a1e"});
  var legI=e("div",{display:"flex",gap:"12px",flexWrap:"wrap"});
  STAGES.forEach(function(s){
    var item=e("div",{display:"flex",alignItems:"center",gap:"5px"});
    item.appendChild(e("div",{width:"9px",height:"9px",borderRadius:"2px",background:s.color}));
    item.appendChild(e("span",{fontSize:"9px",color:"#666",letterSpacing:"0.5px",fontWeight:"600"},[tx(s.short)]));
    legI.appendChild(item);
  });
  leg.appendChild(legI);
  leg.appendChild(e("span",{fontSize:"9px",color:"#333"},[tx("← scrollen →")]));
  root.appendChild(leg);
  // Scroll
  var scroll=e("div",{overflowX:"auto",WebkitOverflowScrolling:"touch"});
  var wrap=e("div",{display:"flex",minWidth:(SIDEBAR_W+totalW+16)+"px"});
  // Sidebar
  var sb=e("div",{width:SIDEBAR_W+"px",flexShrink:"0",position:"sticky",left:"0",zIndex:"20",background:"#08080a",borderRight:"1px solid #1a1a1e"});
  sb.appendChild(e("div",{height:RULER_H+"px",background:"#0d0d10",borderBottom:"1px solid #1a1a1e"}));
  STAGES.forEach(function(s,si){
    var row=e("div",{height:ROW_H+"px",display:"flex",alignItems:"center",paddingLeft:"10px",borderBottom:"1px solid #141418",background:si%2===0?"#08080a":"#0c0c0f"});
    var lbl=e("div",{fontSize:"8px",fontWeight:"900",color:s.color,letterSpacing:"0.8px",textTransform:"uppercase",lineHeight:"1.5"});
    s.short.split(" ").forEach(function(w){lbl.appendChild(e("div",{},[tx(w)]));});
    row.appendChild(lbl);sb.appendChild(row);
  });
  wrap.appendChild(sb);
  // Grid
  var grid=e("div",{position:"relative",width:totalW+"px",flexShrink:"0"});
  // Ruler
  var ruler=e("div",{position:"relative",height:RULER_H+"px",background:"#0d0d10",borderBottom:"1px solid #1a1a1e"});
  for(var m=cfg.ds;m<=cfg.de;m+=60){
    var tick=e("div",{position:"absolute",left:((m-cfg.ds)*PPM)+"px",top:"0",bottom:"0",borderLeft:"1px solid #1e1e26",paddingLeft:"5px",display:"flex",alignItems:"center"});
    tick.appendChild(e("span",{fontSize:"9px",color:"#444",whiteSpace:"nowrap",fontWeight:"600"},[tx(fmtM(m))]));
    ruler.appendChild(tick);
  }
  grid.appendChild(ruler);
  STAGES.forEach(function(stage,si){
    var row=e("div",{position:"relative",height:ROW_H+"px",borderBottom:"1px solid #141418",background:si%2===0?"#08080a":"#0c0c0f"});
    for(var m=cfg.ds;m<=cfg.de;m+=60)
      row.appendChild(e("div",{position:"absolute",left:((m-cfg.ds)*PPM)+"px",top:"0",bottom:"0",borderLeft:"1px solid #121216"}));
    ACTS[d].filter(function(a){return a.stage===stage.id;}).forEach(function(act){
      var sOff=toMin(act.start)-cfg.ds,dur=toMin(act.end)-toMin(act.start);
      var lft=sOff*PPM+2,wid=Math.max(dur*PPM-4,16);
      var k=mk(d,act.name),isSel=state.sel.has(k),isConf=cf.has(k);
      var others=getOthers(d,act.name);
      var block=e("div",{position:"absolute",left:lft+"px",top:"5px",width:wid+"px",height:(ROW_H-10)+"px",borderRadius:"5px",cursor:"pointer",padding:"3px 5px",overflow:"hidden",background:isSel?stage.color:stage.color+"22",border:isSel?"2px solid "+stage.color:(isConf?"2px solid #ffd60a":"1px solid "+stage.color+"44"),boxShadow:isSel?"0 0 18px "+stage.color+"55":"none",transition:"box-shadow 0.15s",display:"flex",flexDirection:"column",justifyContent:"center"});
      var nm=e("div",{fontSize:"9px",fontWeight:isSel?"900":"600",color:isSel?"#fff":"#aaa",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",lineHeight:"1.2"});
      if(isConf)nm.appendChild(e("span",{color:"#ffd60a"},[tx("⚠ ")]));
      if(isSel)nm.appendChild(e("span",{},[tx("✓ ")]));
      nm.appendChild(tx(act.name));
      block.appendChild(nm);
      if(dur*PPM>44)block.appendChild(e("div",{fontSize:"8px",color:isSel?"rgba(255,255,255,0.5)":"#555",marginTop:"1px"},[tx(act.start+"–"+act.end)]));
      if(others.length>0)block.appendChild(e("div",{fontSize:"8px",color:isSel?"rgba(255,255,255,0.7)":"stage.color",marginTop:"1px",color:stage.color},[tx("👥 "+others.length)]));
      block.addEventListener("click",function(){
        if(state.sel.has(k))state.sel.delete(k);else state.sel.add(k);
        savePlan();render();
      });
      row.appendChild(block);
    });
    grid.appendChild(row);
  });
  wrap.appendChild(grid);scroll.appendChild(wrap);root.appendChild(scroll);
  if(d==="saturday"){
    var banner=e("div",{margin:"10px 14px 0",background:"#0d1a0d",border:"1px solid rgba(82,183,136,0.27)",borderRadius:"10px",padding:"10px 14px",display:"flex",alignItems:"center",gap:"10px"});
    banner.appendChild(e("span",{fontSize:"18px"},[tx("🎉")]));

    bt.appendChild(e("div",{fontSize:"11px",color:"#555",marginTop:"2px"},[tx("Skaters Palace · Sa 27.06. · ab 22:00 · Freier Eintritt mit Bändchen")]));
    banner.appendChild(bt);root.appendChild(banner);
  }
  root.appendChild(e("div",{padding:"8px 14px",fontSize:"10px",color:"#333",textAlign:"center"},[tx("Antippen = zum Plan hinzufügen / entfernen")]));
  return root;
}

// ── Mein Plan ─────────────────────────────────────────────────────────────────
function renderMyPlan(){
  var root=e("div",{padding:"14px 14px 48px"}),cf=calcConflicts();
  var plan=[];
  ["friday","saturday"].forEach(function(d){
    ACTS[d].filter(function(a){return state.sel.has(mk(d,a.name));}).forEach(function(a){plan.push({name:a.name,stage:a.stage,start:a.start,end:a.end,day:d});});
  });
  plan.sort(function(a,b){if(a.day!==b.day)return a.day==="friday"?-1:1;return toMin(a.start)-toMin(b.start);});
  if(!plan.length){
    var emp=e("div",{textAlign:"center",padding:"56px 20px",color:"#333"});
    emp.appendChild(e("div",{fontSize:"48px",marginBottom:"16px"},[tx("🎸")]));
    emp.appendChild(e("div",{fontSize:"15px",fontWeight:"800",marginBottom:"8px",color:"#555",letterSpacing:"1px"},[tx("PLAN LEER")]));
    emp.appendChild(e("div",{fontSize:"12px",color:"#444",lineHeight:"1.7"},[tx("Geh zu „Alle Bands“ und tippe eine Band an.")]));
    root.appendChild(emp);return root;
  }
  if(cf.size>0){
    var cb=e("div",{background:"#1f1900",border:"1px solid rgba(255,214,10,0.2)",borderRadius:"8px",padding:"10px 12px",marginBottom:"14px",display:"flex",gap:"8px",alignItems:"flex-start"});
    cb.appendChild(e("span",{fontSize:"14px",color:"#ffd60a",flexShrink:"0"},[tx("⚠")]));
    cb.appendChild(e("span",{fontSize:"12px",color:"#ffd60a",lineHeight:"1.5"},[tx("Zeitüberschneidung — markierte Acts überlappen sich.")]));
    root.appendChild(cb);
  }
  ["friday","saturday"].forEach(function(d){
    var acts=plan.filter(function(a){return a.day===d;});
    if(!acts.length)return;
    var grp=e("div",{marginBottom:"20px"});
    grp.appendChild(e("div",{fontSize:"10px",fontWeight:"900",color:"#ff4500",letterSpacing:"2px",textTransform:"uppercase",marginBottom:"10px",paddingBottom:"8px",borderBottom:"1px solid #1e1e24"},[tx(DAYS[d].full)]));
    acts.forEach(function(act){
      var stg=stageOf(act.stage),k=mk(d,act.name),isConf=cf.has(k);
      var others=getOthers(d,act.name);
      var row=e("div",{display:"flex",alignItems:"center",gap:"10px",padding:"11px 12px",marginBottom:"6px",background:"#111116",borderRadius:"9px"});
      row.style.borderLeft="4px solid "+stg.color;
      row.style.borderTop="1px solid "+(isConf?"rgba(255,214,10,0.2)":"#1a1a1e");
      row.style.borderRight="1px solid "+(isConf?"rgba(255,214,10,0.2)":"#1a1a1e");
      row.style.borderBottom="1px solid "+(isConf?"rgba(255,214,10,0.2)":"#1a1a1e");
      row.appendChild(e("div",{width:"10px",height:"10px",borderRadius:"3px",background:stg.color,flexShrink:"0"}));
      var info=e("div",{flex:"1",minWidth:"0"});
      var nrow=e("div",{fontWeight:"800",fontSize:"13px",display:"flex",alignItems:"center",gap:"6px",marginBottom:"3px"});
      if(isConf)nrow.appendChild(e("span",{fontSize:"11px",color:"#ffd60a",flexShrink:"0"},[tx("⚠")]));
      nrow.appendChild(tx(act.name));
      info.appendChild(nrow);
      var meta=e("div",{fontSize:"11px",display:"flex",gap:"6px",alignItems:"center",flexWrap:"wrap"});
      meta.appendChild(e("span",{color:stg.color,fontWeight:"700",fontSize:"10px"},[tx(stg.short)]));
      meta.appendChild(e("span",{color:"#2a2a2e"},[tx("·")]));
      meta.appendChild(e("span",{color:"#555"},[tx(act.start+" – "+act.end)]));
      if(others.length>0){
        meta.appendChild(e("span",{color:"#2a2a2e"},[tx("·")]));
        meta.appendChild(e("span",{color:"#0096c7",fontSize:"10px"},[tx("👥 "+others.join(", "))]));
      }
      info.appendChild(meta);
      row.appendChild(info);
      var rb=e("button",{background:"#1e1e24",border:"none",color:"#555",fontSize:"15px",width:"26px",height:"26px",borderRadius:"6px",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:"0"});
      rb.appendChild(tx("×"));
      (function(k2){rb.addEventListener("click",function(){state.sel.delete(k2);savePlan();render();});})(k);
      row.appendChild(rb);
      grp.appendChild(row);
    });
    root.appendChild(grp);
  });
  root.appendChild(e("div",{textAlign:"center",fontSize:"11px",color:"#333",marginTop:"12px"},[tx(plan.length+" "+(plan.length===1?"Act":"Acts")+" ausgewählt")]));
  return root;
}

// ── Gruppe ────────────────────────────────────────────────────────────────────
function renderGruppe(){
  var root=e("div",{padding:"14px 14px 48px"}),d=state.day;
  // Build actName -> [people] map
  var actMap={};
  ACTS[d].forEach(function(act){
    if(state.sel.has(mk(d,act.name))){actMap[act.name]=actMap[act.name]||[];actMap[act.name].push("Du");}
  });
  Object.keys(state.allPlans).forEach(function(alias){
    if(alias===state.alias)return;
    ((state.allPlans[alias]||{})[d]||[]).forEach(function(name){
      actMap[name]=actMap[name]||[];actMap[name].push(alias);
    });
  });
  var hasAny=Object.keys(actMap).length>0;
  if(!hasAny){
    var emp=e("div",{textAlign:"center",padding:"56px 20px",color:"#333"});
    emp.appendChild(e("div",{fontSize:"40px",marginBottom:"16px"},[tx("👥")]));
    emp.appendChild(e("div",{fontSize:"14px",fontWeight:"800",marginBottom:"8px",color:"#555"},[tx("Noch niemand hat etwas ausgewählt")]));
    emp.appendChild(e("div",{fontSize:"12px",color:"#444",lineHeight:"1.7"},[tx("Wählt Acts in „Alle Bands“ aus —
dann erscheinen sie hier.")]));
    root.appendChild(emp);return root;
  }
  root.appendChild(e("div",{fontSize:"10px",fontWeight:"900",color:"#888",letterSpacing:"2px",textTransform:"uppercase",marginBottom:"14px",paddingBottom:"8px",borderBottom:"1px solid #1e1e24"},[tx(DAYS[d].full+" · Gruppenplan")]));
  ACTS[d].filter(function(a){return actMap[a.name];}).forEach(function(act){
    var people=actMap[act.name],stg=stageOf(act.stage);
    var row=e("div",{display:"flex",alignItems:"center",gap:"10px",padding:"10px 12px",marginBottom:"6px",background:"#111116",borderRadius:"9px",borderLeft:"4px solid "+stg.color});
    var info=e("div",{flex:"1",minWidth:"0"});
    info.appendChild(e("div",{fontWeight:"800",fontSize:"13px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginBottom:"2px"},[tx(act.name)]));
    info.appendChild(e("div",{fontSize:"10px",color:"#555"},[tx(stg.short+" · "+act.start+"–"+act.end)]));
    row.appendChild(info);
    var badges=e("div",{display:"flex",flexWrap:"wrap",gap:"4px",justifyContent:"flex-end",flexShrink:"0",maxWidth:"55%"});
    people.forEach(function(person){
      var isDu=person==="Du";
      badges.appendChild(e("div",{padding:"3px 8px",borderRadius:"12px",fontSize:"11px",fontWeight:"700",background:isDu?"#ff4500":"#1e2a3a",color:isDu?"#fff":"#0096c7",whiteSpace:"nowrap"},[tx(person)]));
    });
    row.appendChild(badges);
    root.appendChild(row);
  });
  return root;
}

// ── Special views ─────────────────────────────────────────────────────────────
function renderThursday(){
  var root=e("div",{padding:"14px 14px 48px"});
  root.appendChild(e("div",{fontSize:"11px",color:"#ff4500",fontWeight:"900",letterSpacing:"2px",textTransform:"uppercase",marginBottom:"14px",paddingBottom:"10px",borderBottom:"1px solid #1e1e24"},[tx("Opening Night · Donnerstag, 25. Juni")]));
  var card=e("div",{background:"#111116",borderRadius:"12px",padding:"18px 16px",borderLeft:"4px solid #ff4500"});
  card.appendChild(e("div",{fontSize:"16px",fontWeight:"900",color:"#fff",marginBottom:"4px"},[tx("Skaters Palace")]));
  card.appendChild(e("div",{fontSize:"12px",color:"#666",marginBottom:"14px"},[tx("Einlass 18:30 Uhr · Beginn 19:00 Uhr")]));
  var pills=e("div",{display:"flex",flexWrap:"wrap",gap:"8px",marginBottom:"16px"});
  ["Backstabbed","DeathbyRomy","Malevolence"].forEach(function(n){pills.appendChild(e("div",{padding:"7px 14px",borderRadius:"20px",background:"#1a1a1e",color:"#ccc",fontWeight:"700",fontSize:"13px"},[tx(n)]));});
  card.appendChild(pills);
  var notice=e("div",{display:"flex",alignItems:"flex-start",gap:"8px",background:"#1f2a00",borderRadius:"8px",padding:"9px 12px"});
  notice.appendChild(e("span",{fontSize:"15px"},[tx("🎟")]));
  notice.appendChild(e("span",{fontSize:"11px",color:"#b5e550",lineHeight:"1.5"},[tx("Kostenlos für alle Festivalbesuchenden")]));
  card.appendChild(notice);root.appendChild(card);
  root.appendChild(e("div",{fontSize:"11px",color:"#444",marginTop:"8px",textAlign:"center"},[tx("Reihenfolge nicht offiziell bestätigt")]));
  return root;
}

function renderMastership(){
  var root=e("div",{padding:"14px 14px 48px"});
  root.appendChild(e("div",{fontSize:"11px",color:"#f0a500",fontWeight:"900",letterSpacing:"2px",textTransform:"uppercase",marginBottom:"14px",paddingBottom:"10px",borderBottom:"1px solid #1e1e24"},[tx("Münster Monster Mastership")]));
  var card=e("div",{background:"#111116",borderRadius:"12px",padding:"18px 16px",borderLeft:"4px solid #f0a500",marginBottom:"16px"});
  card.appendChild(e("div",{fontSize:"15px",fontWeight:"900",color:"#fff",marginBottom:"4px"},[tx("Halfpipe Showcase · Vert Legends")]));
  card.appendChild(e("div",{fontSize:"12px",color:"#888",marginBottom:"12px"},[tx("Halle Münsterland · Fr 26.6. & Sa 27.6.")]));
  var n1=e("div",{display:"flex",alignItems:"flex-start",gap:"8px",background:"#1f1600",borderRadius:"8px",padding:"9px 12px",marginBottom:"6px"});
  n1.appendChild(e("span",{fontSize:"14px",flexShrink:"0"},[tx("⏰")]));
  n1.appendChild(e("span",{fontSize:"11px",color:"#f0a500",lineHeight:"1.5"},[tx("Genaue Zeiten noch nicht veröffentlicht")]));
  card.appendChild(n1);
  var n2=e("div",{display:"flex",alignItems:"flex-start",gap:"8px",background:"#1a001a",borderRadius:"8px",padding:"9px 12px"});
  n2.appendChild(e("span",{fontSize:"14px",flexShrink:"0"},[tx("🎟")]));
  n2.appendChild(e("span",{fontSize:"11px",color:"#cc88ff",lineHeight:"1.5"},[tx("Separates Ticket erforderlich · Für Festivalbesuchende kostenlos")]));
  card.appendChild(n2);root.appendChild(card);
  root.appendChild(e("div",{fontSize:"10px",fontWeight:"900",color:"#888",letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:"10px"},[tx("Bestätigte Rider")]));
  var grid=e("div",{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px",marginBottom:"20px"});
  RIDERS.forEach(function(name){
    var rc=e("div",{padding:"10px 12px",background:"#111116",borderRadius:"8px",fontWeight:"700",fontSize:"13px",color:"#e0e0e0",display:"flex",alignItems:"center",gap:"8px"});
    rc.appendChild(e("span",{fontSize:"13px"},[tx("🛹")]));rc.appendChild(tx(name));grid.appendChild(rc);
  });
  root.appendChild(grid);
  return root;
}

// ── Main render ───────────────────────────────────────────────────────────────
function render(){
  var app=document.getElementById("app");
  while(app.firstChild)app.removeChild(app.firstChild);
  if(!state.alias){app.appendChild(renderLogin());return;}
  app.appendChild(renderHeader());
  app.appendChild(renderControls());
  var d=state.day;
  if(d==="thursday")app.appendChild(renderThursday());
  else if(d==="mastership")app.appendChild(renderMastership());
  else if(state.view==="all")app.appendChild(renderTimeline());
  else if(state.view==="mine")app.appendChild(renderMyPlan());
  else app.appendChild(renderGruppe());
}

// ── Boot ──────────────────────────────────────────────────────────────────────
var saved=localStorage.getItem("vs26_alias");
if(saved){
  state.alias=saved;
  db.ref("/plans/"+saved).once("value",function(snap){
    var plan=snap.val()||{};
    ["friday","saturday"].forEach(function(d){(plan[d]||[]).forEach(function(n){state.sel.add(mk(d,n));});});
    startListener();
    render();
  });
}else{render();}
</script>
