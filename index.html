<title>Vainstream 2026</title>
<style>

<body>
<div id="app"></div>
<script>
var PPM=2.4,ROW_H=84,RULER_H=36,SIDEBAR_W=94;

var STAGES=[
  {id:"EMP Stage",           short:"EMP",        color:"#ff4500"},
  {id:"Murder Stage",        short:"MURDER",     color:"#d90429"},
  {id:"Rocknight Stage",     short:"ROCKNIGHT",  color:"#0096c7"},
  {id:"Green Hell Club Stage",short:"GREEN HELL",color:"#52b788"}
];

var RIDERS=["Tony Magnusson","Mike Crum","Kevin Staab","Hans Puttis Jacobsson","Renton Miller","Nicky Guerrero","Lester Kasai","Anders Tellen"];

var ACTS={
  friday:[{"name":"Rise Against","stage":"EMP Stage","start":"21:20","end":"22:30"},{"name":"Social Distortion","stage":"EMP Stage","start":"19:20","end":"20:10"},{"name":"All Time Low","stage":"EMP Stage","start":"17:30","end":"18:20"},{"name":"Set It Off","stage":"EMP Stage","start":"15:55","end":"16:35"},{"name":"I Killed The Prom Queen","stage":"EMP Stage","start":"14:35","end":"15:15"},{"name":"Wargasm","stage":"EMP Stage","start":"13:30","end":"14:00"},{"name":"Landmvrks","stage":"Murder Stage","start":"20:15","end":"21:15"},{"name":"Bury Tomorrow","stage":"Murder Stage","start":"18:25","end":"19:15"},{"name":"Pennywise","stage":"Murder Stage","start":"16:40","end":"17:25"},{"name":"Lionheart","stage":"Murder Stage","start":"15:15","end":"15:55"},{"name":"Dying Wish","stage":"Murder Stage","start":"14:00","end":"14:35"},{"name":"Siamese","stage":"Murder Stage","start":"13:00","end":"13:30"},{"name":"Sleep Theory","stage":"Rocknight Stage","start":"21:45","end":"22:30"},{"name":"The Menzingers","stage":"Rocknight Stage","start":"20:30","end":"21:15"},{"name":"La Dispute","stage":"Rocknight Stage","start":"19:15","end":"20:00"},{"name":"Shoreline","stage":"Rocknight Stage","start":"18:00","end":"18:45"},{"name":"Hi! Spencer","stage":"Rocknight Stage","start":"16:50","end":"17:30"},{"name":"The Ataris","stage":"Rocknight Stage","start":"15:40","end":"16:20"},{"name":"Massendefekt","stage":"Rocknight Stage","start":"14:30","end":"15:10"},{"name":"Still Talk","stage":"Rocknight Stage","start":"13:30","end":"14:00"},{"name":"Get The Shot","stage":"Green Hell Club Stage","start":"00:05","end":"01:00"},{"name":"Haywire","stage":"Green Hell Club Stage","start":"22:45","end":"23:30"},{"name":"End It","stage":"Green Hell Club Stage","start":"20:20","end":"21:00"},{"name":"Death Lens","stage":"Green Hell Club Stage","start":"19:10","end":"19:50"},{"name":"Initiate","stage":"Green Hell Club Stage","start":"18:00","end":"18:40"},{"name":"Whispers","stage":"Green Hell Club Stage","start":"17:00","end":"17:30"},{"name":"Volatile Ways","stage":"Green Hell Club Stage","start":"16:00","end":"16:30"},{"name":"Heartless Human Harvest","stage":"Green Hell Club Stage","start":"15:00","end":"15:30"}],
  saturday:[{"name":"Architects","stage":"EMP Stage","start":"21:20","end":"22:30"},{"name":"Hollywood Undead","stage":"EMP Stage","start":"19:20","end":"20:10"},{"name":"Bloodywood","stage":"EMP Stage","start":"17:45","end":"18:30"},{"name":"Thrown","stage":"EMP Stage","start":"16:15","end":"16:55"},{"name":"We Came As Romans","stage":"EMP Stage","start":"14:50","end":"15:30"},{"name":"Magnolia Park","stage":"EMP Stage","start":"13:35","end":"14:10"},{"name":"Boundaries","stage":"EMP Stage","start":"12:30","end":"13:00"},{"name":"Sondaschule","stage":"Murder Stage","start":"20:15","end":"21:15"},{"name":"Black Veil Brides","stage":"Murder Stage","start":"18:30","end":"19:20"},{"name":"Grandson","stage":"Murder Stage","start":"17:00","end":"17:45"},{"name":"Alkaline Trio","stage":"Murder Stage","start":"15:35","end":"16:15"},{"name":"Future Palace","stage":"Murder Stage","start":"14:10","end":"14:50"},{"name":"Raum27","stage":"Murder Stage","start":"13:00","end":"13:35"},{"name":"The Pretty Wild","stage":"Murder Stage","start":"12:00","end":"12:30"},{"name":"Suicidal Tendencies","stage":"Rocknight Stage","start":"21:30","end":"22:30"},{"name":"Agnostic Front","stage":"Rocknight Stage","start":"20:15","end":"21:00"},{"name":"Smoke Blow","stage":"Rocknight Stage","start":"19:00","end":"19:45"},{"name":"Dog Eat Dog","stage":"Rocknight Stage","start":"17:50","end":"18:30"},{"name":"Delinquent Habits","stage":"Rocknight Stage","start":"16:40","end":"17:20"},{"name":"Scene Queen","stage":"Rocknight Stage","start":"15:35","end":"16:10"},{"name":"Pöbel MC","stage":"Rocknight Stage","start":"14:30","end":"15:05"},{"name":"The Flatliners","stage":"Rocknight Stage","start":"13:30","end":"14:00"},{"name":"Attic109","stage":"Rocknight Stage","start":"12:30","end":"13:00"},{"name":"The Casualties","stage":"Green Hell Club Stage","start":"00:05","end":"01:00"},{"name":"Ways Away","stage":"Green Hell Club Stage","start":"22:45","end":"23:30"},{"name":"TX2","stage":"Green Hell Club Stage","start":"21:30","end":"22:15"},{"name":"Nevertel","stage":"Green Hell Club Stage","start":"20:20","end":"21:00"},{"name":"TSS","stage":"Green Hell Club Stage","start":"18:40","end":"19:20"},{"name":"Footballhead","stage":"Green Hell Club Stage","start":"17:30","end":"18:10"},{"name":"Mimi Barks","stage":"Green Hell Club Stage","start":"16:30","end":"17:00"},{"name":"Gridiron","stage":"Green Hell Club Stage","start":"15:30","end":"16:00"}]
};

var DAYS={
  thursday: {label:"Do 25.6.",full:"Donnerstag, 25. Juni",  ds:null,   de:null  },
  friday:   {label:"Fr 26.6.",full:"Freitag, 26. Juni",     ds:13*60,  de:25*60 },
  saturday: {label:"Sa 27.6.",full:"Samstag, 27. Juni",     ds:12*60,  de:25*60 },
  mastership:{label:"\uD83C\uDFC2 MMM",full:"Monster Mastership",ds:null,de:null}
};

var state={day:"friday",view:"all",sel:new Set()};

function toMin(t){var p=t.split(":"),h=+p[0],m=+p[1];return h<6?(h+24)*60+m:h*60+m;}
function pad2(n){return String(n).padStart(2,"0");}
function fmtM(m){return pad2(Math.floor(m/60)%24)+":"+pad2(m%60);}
function key(d,n){return d+"::"+n;}
function stageOf(id){return STAGES.find(function(s){return s.id===id;})||STAGES[0];}

function conflicts(){
  var c=new Set();
  ["friday","saturday"].forEach(function(d){
    var sel=ACTS[d].filter(function(a){return state.sel.has(key(d,a.name));});
    for(var i=0;i<sel.length;i++)for(var j=i+1;j<sel.length;j++){
      var aS=toMin(sel[i].start),aE=toMin(sel[i].end),bS=toMin(sel[j].start),bE=toMin(sel[j].end);
      if(aS<bE&&bS<aE){c.add(key(d,sel[i].name));c.add(key(d,sel[j].name));}
    }
  });
  return c;
}

// DOM helper: create element with inline styles + children
function e(tag,st,ch){
  var el=document.createElement(tag);
  if(st)Object.keys(st).forEach(function(k){el.style[k]=st[k];});
  if(ch)ch.forEach(function(c){
    if(c==null)return;
    if(typeof c==="string"||typeof c==="number")el.appendChild(document.createTextNode(c));
    else el.appendChild(c);
  });
  return el;
}
function t(text){return document.createTextNode(text);}

function renderHeader(){
  var h=e("div",{background:"linear-gradient(160deg,#1a0800,#0e0e12)",padding:"14px 16px 12px",borderBottom:"1px solid #1e1e24"});
  var title=e("div",{fontSize:"20px",fontWeight:"900",letterSpacing:"3px",lineHeight:"1"});
  title.appendChild(e("span",{color:"#ff4500"},[t("VAINSTREAM ")]));
  title.appendChild(e("span",{color:"#fff"},[t("2026")]));
  h.appendChild(title);
  h.appendChild(e("div",{fontSize:"10px",color:"#555",marginTop:"4px",letterSpacing:"2px",textTransform:"uppercase"},[t("Münster · Am Hawerkamp · 26.–27. Juni")]));
  return h;
}

function renderControls(){
  var wrap=e("div",{padding:"12px 14px 0",background:"#0d0d10",borderBottom:"1px solid #1e1e24"});
  // Day tabs
  var tabs=e("div",{display:"flex",gap:"5px",marginBottom:"10px"});
  [{k:"thursday",l:"Do 25.6."},{k:"friday",l:"Fr 26.6."},{k:"saturday",l:"Sa 27.6."},{k:"mastership",l:"\uD83C\uDFC2 MMM"}].forEach(function(item){
    var btn=e("button",{
      flex:"1",padding:"7px 4px",borderRadius:"7px",border:"none",
      fontWeight:"800",fontSize:"11px",letterSpacing:"0.5px",
      textTransform:item.k==="mastership"?"none":"uppercase",
      background:state.day===item.k?"#ff4500":"#18181d",
      color:state.day===item.k?"#fff":"#555",transition:"all 0.2s"
    },[t(item.l)]);
    btn.addEventListener("click",function(){
      state.day=item.k;
      if(item.k==="thursday"||item.k==="mastership")state.view="all";
      render();
    });
    tabs.appendChild(btn);
  });
  wrap.appendChild(tabs);
  // View toggle
  if(state.day==="friday"||state.day==="saturday"){
    var views=e("div",{display:"flex",gap:"6px",paddingBottom:"10px"});
    [{k:"all",l:"Alle Bands"},{k:"mine",l:"Mein Plan"+(state.sel.size?"  ·  "+state.sel.size:"")}].forEach(function(item){
      var btn=e("button",{
        flex:"1",padding:"7px 0",borderRadius:"7px",
        fontWeight:"700",fontSize:"12px",
        border:"2px solid "+(state.view===item.k?"#ff4500":"#1e1e24"),
        background:"transparent",
        color:state.view===item.k?"#ff4500":"#444",transition:"all 0.2s"
      },[t(item.l)]);
      btn.addEventListener("click",function(){state.view=item.k;render();});
      views.appendChild(btn);
    });
    wrap.appendChild(views);
  }
  return wrap;
}

function renderTimeline(){
  var d=state.day,cfg=DAYS[d],totalW=(cfg.de-cfg.ds)*PPM,cf=conflicts();
  var root=e("div",{});
  // Legend
  var leg=e("div",{padding:"8px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",background:"#0d0d10",borderBottom:"1px solid #1a1a1e"});
  var legItems=e("div",{display:"flex",gap:"12px",flexWrap:"wrap"});
  STAGES.forEach(function(s){
    var item=e("div",{display:"flex",alignItems:"center",gap:"5px"});
    item.appendChild(e("div",{width:"9px",height:"9px",borderRadius:"2px",background:s.color}));
    item.appendChild(e("span",{fontSize:"9px",color:"#666",letterSpacing:"0.5px",fontWeight:"600"},[t(s.short)]));
    legItems.appendChild(item);
  });
  leg.appendChild(legItems);
  leg.appendChild(e("span",{fontSize:"9px",color:"#333"},[t("\u2190 scrollen \u2192")]));
  root.appendChild(leg);
  // Scroll container
  var scroll=e("div",{overflowX:"auto",WebkitOverflowScrolling:"touch"});
  var wrap=e("div",{display:"flex",minWidth:(SIDEBAR_W+totalW+16)+"px"});
  // Sidebar
  var sb=e("div",{width:SIDEBAR_W+"px",flexShrink:"0",position:"sticky",left:"0",zIndex:"20",background:"#08080a",borderRight:"1px solid #1a1a1e"});
  sb.appendChild(e("div",{height:RULER_H+"px",background:"#0d0d10",borderBottom:"1px solid #1a1a1e"}));
  STAGES.forEach(function(s,si){
    var row=e("div",{height:ROW_H+"px",display:"flex",alignItems:"center",paddingLeft:"10px",borderBottom:"1px solid #141418",background:si%2===0?"#08080a":"#0c0c0f"});
    var lbl=e("div",{fontSize:"8px",fontWeight:"900",color:s.color,letterSpacing:"0.8px",textTransform:"uppercase",lineHeight:"1.5"});
    s.short.split(" ").forEach(function(w){lbl.appendChild(e("div",{},[t(w)]));});
    row.appendChild(lbl);
    sb.appendChild(row);
  });
  wrap.appendChild(sb);
  // Grid
  var grid=e("div",{position:"relative",width:totalW+"px",flexShrink:"0"});
  // Ruler
  var ruler=e("div",{position:"relative",height:RULER_H+"px",background:"#0d0d10",borderBottom:"1px solid #1a1a1e"});
  for(var m=cfg.ds;m<=cfg.de;m+=60){
    var tick=e("div",{position:"absolute",left:((m-cfg.ds)*PPM)+"px",top:"0",bottom:"0",borderLeft:"1px solid #1e1e26",paddingLeft:"5px",display:"flex",alignItems:"center"});
    tick.appendChild(e("span",{fontSize:"9px",color:"#444",whiteSpace:"nowrap",fontWeight:"600"},[t(fmtM(m))]));
    ruler.appendChild(tick);
  }
  grid.appendChild(ruler);
  // Stage rows
  STAGES.forEach(function(stage,si){
    var row=e("div",{position:"relative",height:ROW_H+"px",borderBottom:"1px solid #141418",background:si%2===0?"#08080a":"#0c0c0f"});
    for(var m=cfg.ds;m<=cfg.de;m+=60)
      row.appendChild(e("div",{position:"absolute",left:((m-cfg.ds)*PPM)+"px",top:"0",bottom:"0",borderLeft:"1px solid #121216"}));
    ACTS[d].filter(function(a){return a.stage===stage.id;}).forEach(function(act){
      var sOff=toMin(act.start)-cfg.ds,dur=toMin(act.end)-toMin(act.start);
      var lft=sOff*PPM+2,wid=Math.max(dur*PPM-4,16);
      var k=key(d,act.name),isSel=state.sel.has(k),isConf=cf.has(k);
      var block=e("div",{
        position:"absolute",left:lft+"px",top:"5px",width:wid+"px",height:(ROW_H-10)+"px",
        borderRadius:"5px",cursor:"pointer",padding:"3px 5px",overflow:"hidden",
        background:isSel?stage.color:stage.color+"22",
        border:isSel?"2px solid "+stage.color:(isConf?"2px solid #ffd60a":"1px solid "+stage.color+"44"),
        boxShadow:isSel?"0 0 18px "+stage.color+"55":"none",
        transition:"box-shadow 0.15s",display:"flex",flexDirection:"column",justifyContent:"center"
      });
      var nm=e("div",{fontSize:"9px",fontWeight:isSel?"900":"600",color:isSel?"#fff":"#aaa",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",lineHeight:"1.2"});
      if(isConf)nm.appendChild(e("span",{color:"#ffd60a"},[t("\u26A0 ")]));
      if(isSel)nm.appendChild(e("span",{},[t("\u2713 ")]));
      nm.appendChild(t(act.name));
      block.appendChild(nm);
      if(dur*PPM>44)block.appendChild(e("div",{fontSize:"8px",color:isSel?"rgba(255,255,255,0.5)":"#555",marginTop:"2px"},[t(act.start+"\u2013"+act.end)]));
      block.addEventListener("click",function(){
        if(state.sel.has(k))state.sel.delete(k);else state.sel.add(k);
        render();
      });
      row.appendChild(block);
    });
    grid.appendChild(row);
  });
  wrap.appendChild(grid);
  scroll.appendChild(wrap);
  root.appendChild(scroll);
  // Aftershow (Saturday)
  if(d==="saturday"){
    var banner=e("div",{margin:"12px 14px 0",background:"#0d1a0d",border:"1px solid rgba(82,183,136,0.27)",borderRadius:"10px",padding:"10px 14px",display:"flex",alignItems:"center",gap:"10px"});
    banner.appendChild(e("span",{fontSize:"20px"},[t("\uD83C\uDF89")]));
    var bt=e("div",{});
    bt.appendChild(e("div",{fontWeight:"800",fontSize:"12px",color:"#52b788"},[t("Aftershow \u00B7 Morecore Party")]));
    bt.appendChild(e("div",{fontSize:"11px",color:"#555",marginTop:"2px"},[t("Skaters Palace \u00B7 Sa 27.06. \u00B7 ab 22:00 Uhr \u00B7 Freier Eintritt mit Festivalb\u00E4ndchen")]));
    banner.appendChild(bt);
    root.appendChild(banner);
  }
  root.appendChild(e("div",{padding:"10px 14px",fontSize:"10px",color:"#333",textAlign:"center"},[t("Antippen = zum Plan hinzuf\u00FCgen / entfernen")]));
  return root;
}

function renderMyPlan(){
  var root=e("div",{padding:"14px 14px 48px"}),cf=conflicts();
  var plan=[];
  ["friday","saturday"].forEach(function(d){
    ACTS[d].filter(function(a){return state.sel.has(key(d,a.name));}).forEach(function(a){
      plan.push({name:a.name,stage:a.stage,start:a.start,end:a.end,day:d});
    });
  });
  plan.sort(function(a,b){if(a.day!==b.day)return a.day==="friday"?-1:1;return toMin(a.start)-toMin(b.start);});
  if(!plan.length){
    var emp=e("div",{textAlign:"center",padding:"56px 20px",color:"#333"});
    emp.appendChild(e("div",{fontSize:"48px",marginBottom:"16px"},[t("\uD83C\uDFB8")]));
    emp.appendChild(e("div",{fontSize:"15px",fontWeight:"800",marginBottom:"8px",color:"#555",letterSpacing:"1px"},[t("PLAN LEER")]));
    emp.appendChild(e("div",{fontSize:"12px",color:"#444",lineHeight:"1.7"},[t('Geh zu \u201EAlle Bands\u201C und tippe eine Band an.')]));
    root.appendChild(emp);
    return root;
  }
  if(cf.size>0){
    var cb=e("div",{background:"#1f1900",border:"1px solid rgba(255,214,10,0.2)",borderRadius:"8px",padding:"10px 12px",marginBottom:"14px",display:"flex",gap:"8px",alignItems:"flex-start"});
    cb.appendChild(e("span",{fontSize:"14px",color:"#ffd60a",flexShrink:"0"},[t("\u26A0")]));
    cb.appendChild(e("span",{fontSize:"12px",color:"#ffd60a",lineHeight:"1.5"},[t("Zeitüberschneidung \u2014 markierte Acts überlappen sich.")]));
    root.appendChild(cb);
  }
  ["friday","saturday"].forEach(function(d){
    var acts=plan.filter(function(a){return a.day===d;});
    if(!acts.length)return;
    var grp=e("div",{marginBottom:"20px"});
    grp.appendChild(e("div",{fontSize:"10px",fontWeight:"900",color:"#ff4500",letterSpacing:"2px",textTransform:"uppercase",marginBottom:"10px",paddingBottom:"8px",borderBottom:"1px solid #1e1e24"},[t(DAYS[d].full)]));
    acts.forEach(function(act){
      var stg=stageOf(act.stage),k=key(d,act.name),isConf=cf.has(k);
      var row=e("div",{display:"flex",alignItems:"center",gap:"10px",padding:"11px 12px",marginBottom:"6px",background:"#111116",borderRadius:"9px"});
      row.style.borderLeft="4px solid "+stg.color;
      row.style.outline=isConf?"1px solid rgba(255,214,10,0.35)":"none";
      row.style.borderTop="1px solid "+(isConf?"rgba(255,214,10,0.2)":"#1a1a1e");
      row.style.borderRight="1px solid "+(isConf?"rgba(255,214,10,0.2)":"#1a1a1e");
      row.style.borderBottom="1px solid "+(isConf?"rgba(255,214,10,0.2)":"#1a1a1e");
      row.appendChild(e("div",{width:"10px",height:"10px",borderRadius:"3px",background:stg.color,flexShrink:"0"}));
      var info=e("div",{flex:"1",minWidth:"0"});
      var nrow=e("div",{fontWeight:"800",fontSize:"13px",display:"flex",alignItems:"center",gap:"6px",marginBottom:"3px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"});
      if(isConf)nrow.appendChild(e("span",{fontSize:"11px",color:"#ffd60a",flexShrink:"0"},[t("\u26A0")]));
      nrow.appendChild(t(act.name));
      info.appendChild(nrow);
      var meta=e("div",{fontSize:"11px",display:"flex",gap:"6px",alignItems:"center"});
      meta.appendChild(e("span",{color:stg.color,fontWeight:"700",fontSize:"10px",letterSpacing:"0.5px"},[t(stg.short)]));
      meta.appendChild(e("span",{color:"#2a2a2e"},[t("\u00B7")]));
      meta.appendChild(e("span",{color:"#555"},[t(act.start+" \u2013 "+act.end)]));
      info.appendChild(meta);
      row.appendChild(info);
      var rb=e("button",{background:"#1e1e24",border:"none",color:"#555",fontSize:"15px",width:"26px",height:"26px",borderRadius:"6px",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:"0",lineHeight:"1"},[t("\u00D7")]);
      (function(k2){rb.addEventListener("click",function(){state.sel.delete(k2);render();});})(k);
      row.appendChild(rb);
      grp.appendChild(row);
    });
    root.appendChild(grp);
  });
  root.appendChild(e("div",{textAlign:"center",fontSize:"11px",color:"#333",marginTop:"12px"},[t(plan.length+" "+(plan.length===1?"Act":"Acts")+" ausgewählt")]));
  return root;
}

function renderThursday(){
  var root=e("div",{padding:"14px 14px 48px"});
  root.appendChild(e("div",{fontSize:"11px",color:"#ff4500",fontWeight:"900",letterSpacing:"2px",textTransform:"uppercase",marginBottom:"14px",paddingBottom:"10px",borderBottom:"1px solid #1e1e24"},[t("Opening Night \u00B7 Donnerstag, 25. Juni")]));
  var card=e("div",{background:"#111116",borderRadius:"12px",padding:"18px 16px",borderLeft:"4px solid #ff4500"});
  card.appendChild(e("div",{fontSize:"16px",fontWeight:"900",color:"#fff",marginBottom:"4px"},[t("Skaters Palace")]));
  card.appendChild(e("div",{fontSize:"12px",color:"#666",marginBottom:"14px"},[t("Einlass 18:30 Uhr  \u00B7  Beginn 19:00 Uhr")]));
  var pills=e("div",{display:"flex",flexWrap:"wrap",gap:"8px",marginBottom:"16px"});
  ["Backstabbed","DeathbyRomy","Malevolence"].forEach(function(n){
    pills.appendChild(e("div",{display:"inline-block",padding:"7px 14px",borderRadius:"20px",background:"#1a1a1e",color:"#ccc",fontWeight:"700",fontSize:"13px"},[t(n)]));
  });
  card.appendChild(pills);
  var notice=e("div",{display:"flex",alignItems:"flex-start",gap:"8px",background:"#1f2a00",borderRadius:"8px",padding:"9px 12px"});
  notice.appendChild(e("span",{fontSize:"16px"},[t("\uD83C\uDF9F")]));
  notice.appendChild(e("span",{fontSize:"11px",color:"#b5e550",lineHeight:"1.5"},[t("Kostenloser Eintritt für alle Festivalbesuchenden \u00B7 Festivalbändchen oder -ticket vorzeigen")]));
  card.appendChild(notice);
  root.appendChild(card);
  root.appendChild(e("div",{fontSize:"11px",color:"#444",marginTop:"8px",lineHeight:"1.6",textAlign:"center"},[t("Reihenfolge der Acts nicht offiziell bestätigt")]));
  return root;
}

function renderMastership(){
  var root=e("div",{padding:"14px 14px 48px"});
  root.appendChild(e("div",{fontSize:"11px",color:"#f0a500",fontWeight:"900",letterSpacing:"2px",textTransform:"uppercase",marginBottom:"14px",paddingBottom:"10px",borderBottom:"1px solid #1e1e24"},[t("Münster Monster Mastership")]));
  var card=e("div",{background:"#111116",borderRadius:"12px",padding:"18px 16px",borderLeft:"4px solid #f0a500",marginBottom:"16px"});
  card.appendChild(e("div",{fontSize:"15px",fontWeight:"900",color:"#fff",marginBottom:"4px"},[t("Halfpipe Showcase \u00B7 Vert Legends")]));
  card.appendChild(e("div",{fontSize:"12px",color:"#888",marginBottom:"12px"},[t("Halle Münsterland \u00B7 Fr 26.6. & Sa 27.6.")]));
  var n1=e("div",{display:"flex",alignItems:"flex-start",gap:"8px",background:"#1f1600",borderRadius:"8px",padding:"9px 12px",marginBottom:"6px"});
  n1.appendChild(e("span",{fontSize:"15px",flexShrink:"0"},[t("\u23F0")]));
  n1.appendChild(e("span",{fontSize:"11px",color:"#f0a500",lineHeight:"1.5"},[t("Genaue Zeiten noch nicht veröffentlicht")]));
  card.appendChild(n1);
  var n2=e("div",{display:"flex",alignItems:"flex-start",gap:"8px",background:"#1a001a",borderRadius:"8px",padding:"9px 12px"});
  n2.appendChild(e("span",{fontSize:"15px",flexShrink:"0"},[t("\uD83C\uDF9F")]));
  n2.appendChild(e("span",{fontSize:"11px",color:"#cc88ff",lineHeight:"1.5"},[t("Separates, limitiertes Ticket erforderlich \u00B7 Für reguläre Festivalbesuchende kostenlos zugänglich")]));
  card.appendChild(n2);
  root.appendChild(card);
  root.appendChild(e("div",{fontSize:"10px",fontWeight:"900",color:"#888",letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:"10px"},[t("Bestätigte Rider")]));
  var grid=e("div",{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px",marginBottom:"20px"});
  RIDERS.forEach(function(name){
    var rc=e("div",{padding:"10px 12px",background:"#111116",borderRadius:"8px",fontWeight:"700",fontSize:"13px",color:"#e0e0e0",display:"flex",alignItems:"center",gap:"8px"});
    rc.appendChild(e("span",{fontSize:"14px"},[t("\uD83C\uDFC2")]));
    rc.appendChild(t(name));
    grid.appendChild(rc);
  });
  root.appendChild(grid);
  root.appendChild(e("div",{fontSize:"11px",color:"#444",textAlign:"center",lineHeight:"1.7"},[t("Weitere Infos: vainstream.com/mastership")]));
  return root;
}

function render(){
  var app=document.getElementById("app");
  while(app.firstChild)app.removeChild(app.firstChild);
  app.appendChild(renderHeader());
  app.appendChild(renderControls());
  var d=state.day;
  if(d==="thursday")app.appendChild(renderThursday());
  else if(d==="mastership")app.appendChild(renderMastership());
  else if(state.view==="all")app.appendChild(renderTimeline());
  else app.appendChild(renderMyPlan());
}

render();
</script>
